name: ci-cd

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gamehub
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gamehub?schema=public
      REDIS_URL: redis://localhost:6379
      CORS_ORIGIN: http://localhost:5173
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      PORT: 3001
      NODE_ENV: test
      SESSION_COOKIE_NAME: gh_session
      SESSION_TTL_DAYS: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply migrations
        run: pnpm --filter @gamehub/server exec prisma migrate deploy
      - name: Build workspace
        run: pnpm build
      - name: Test workspace
        run: pnpm test

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger deployment hooks
        run: |
          curl -fsSL -X POST "$RENDER_API_DEPLOY_HOOK"
          curl -fsSL -X POST "$VERCEL_WEB_DEPLOY_HOOK"
        env:
          RENDER_API_DEPLOY_HOOK: ${{ secrets.RENDER_API_DEPLOY_HOOK }}
          VERCEL_WEB_DEPLOY_HOOK: ${{ secrets.VERCEL_WEB_DEPLOY_HOOK }}
